name: Bug report
description: Report a reproducible problem in AgenticKanbasutra.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, tokens, private repository names, and proprietary code from logs before posting.
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: "1.92.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open...
        2. Create...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Relevant context
      description: Include sanitized logs, screenshots, or artifact summaries if useful.
